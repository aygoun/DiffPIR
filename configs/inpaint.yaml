diffpir:
  task: inpaint
  seed: 42

  noise_level_img: 0.0
  noise_level_model: 0.0
  model_name: diffusion_ffhq_10m
  testset_name: demo_test
  num_train_timesteps: 1000
  iter_num: 20
  iter_num_U: 1
  batch_size: 16

  save_L: true
  save_E: true

  lambda_: 1.0
  zeta: 1.0
  sub_1_analytic: true
  log_process: false
  ddim_sample: false
  model_output_type: pred_xstart
  generate_mode: DiffPIR
  skip_type: quad
  eta: 0.0
  guidance_scale: 1.0
  n_channels: 3
  cwd: ""

  calc_LPIPS: true
  beta_start: 0.0001
  beta_end: 0.02

  # inpaint
  sf: 1
  load_mask: false
  mask_name: "gt_keep_masks/face/000000.png"
  mask_type: "random" # box | random | both | extreme
  mask_len_range: [128, 129]
  mask_prob_range: [0.5, 0.5]

pnp_drunet:
  task: inpaint
  name: pnp_drunet
  generate_mode: pnp_drunet

  lambda_: 1.0
  zeta: 0.0
  sf: 1

  # Degradation (kept consistent with DiffPIR inpaint config)
  noise_level_img: 0.0
  load_mask: false
  mask_name: "gt_keep_masks/face/000000.png"
  mask_type: "random"
  mask_len_range: [128, 129]
  mask_prob_range: [0.5, 0.5]

  # PnP hyper-parameters
  denoiser: drunet
  num_iters: 50
  denoiser_sigma: 0.008
  gaussian_kernel_size: 5
  gaussian_sigma: 1.0
  drunet_weights_path: ""

  # Output and metrics
  calc_LPIPS: true
  save_L: true
  save_E: true
  clamp: true
  output_root: "outputs"

pnp_diffbir:
  # PnP inpainting with DiffBIR Stage-1 (SwinIR) as the prior.
  #
  # The DiffBIR Stage-1 SwinIR is a *blind* restorer: it does not receive a
  # noise-level signal, so denoiser_sigma only governs the PnP rho/lambda
  # schedule — not the model itself.  Weights are downloaded automatically
  # from lxq007/DiffBIR on Hugging Face (general_swinir_v1.ckpt) if
  # diffbir_weights_path is left empty.
  task: inpaint
  name: pnp_diffbir
  generate_mode: pnp_diffbir

  lambda_: 1.0
  zeta: 0.0
  sf: 1

  # Degradation (kept consistent with DiffPIR inpaint config)
  noise_level_img: 0.0
  load_mask: false
  mask_name: "gt_keep_masks/face/000000.png"
  mask_type: "random"
  mask_len_range: [128, 129]
  mask_prob_range: [0.5, 0.5]

  # PnP hyper-parameters
  denoiser: diffbir
  num_iters: 20
  # For inpaint with noise_level_img=0, a hard pixel constraint is used for
  # known pixels regardless of rho.  denoiser_sigma here mainly affects how
  # strongly the denoiser is applied in unknown (masked) regions.
  denoiser_sigma: 0.05

  # ---------------------------------------------------------------------------
  # DiffBIR Stage-1 weights
  # ---------------------------------------------------------------------------
  # Leave empty to auto-download general_swinir_v1.ckpt from lxq007/DiffBIR.
  # Set to a local .ckpt / .pth path to override, e.g. model_zoo/general_swinir_v1.ckpt
  diffbir_weights_path: ""

  # Output and metrics
  calc_LPIPS: true
  save_L: true
  save_E: true
  clamp: true
  output_root: "outputs"

pnp_gaussian:
  task: inpaint
  name: pnp_drunet
  generate_mode: pnp_drunet

  lambda_: 1.0
  zeta: 0.0
  sf: 1

  # Degradation (kept consistent with DiffPIR inpaint config)
  noise_level_img: 0.0
  load_mask: false
  mask_name: "gt_keep_masks/face/000000.png"
  mask_type: "random"
  mask_len_range: [128, 129]
  mask_prob_range: [0.5, 0.5]

  # PnP hyper-parameters
  denoiser: gaussian
  num_iters: 50
  denoiser_sigma: 0.008
  gaussian_kernel_size: 5
  gaussian_sigma: 1.0
  drunet_weights_path: ""

  # Output and metrics
  calc_LPIPS: true
  save_L: true
  save_E: true
  clamp: true
  output_root: "outputs"
