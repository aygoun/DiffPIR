pnp_drunet:
  # Base configuration for PnP+DRUNet experiments.
  # This file mirrors the structure of the other task configs (deblur/sisr)
  # but adds a section for PnP-specific hyper‑parameters and DRUNet weights.

  # -----------------------------------------------------------------------------
  # Core experiment settings (used to build MethodConfig)
  # -----------------------------------------------------------------------------

  # Task can be "sr", "deblur", or "inpaint". For the current project we
  # primarily use this as a deblurring baseline; adjust as needed.
  task: deblur

  # Name of the method in plots / registries
  name: pnp_drunet

  # For PnP we do not use the diffusion model; this field is still required by
  # MethodConfig and is used only as a label.
  generate_mode: pnp_drunet

  # Global scalar hyper‑parameters forwarded to MethodConfig
  lambda_: 1.0
  zeta: 0.0

  # Scale factor (sf=1 for deblurring, sf=4 for SR, etc.)
  sf: 1

  # -----------------------------------------------------------------------------
  # Degradation model (kept consistent with DiffPIR deblur config)
  # -----------------------------------------------------------------------------

  noise_level_img: 0.05 # AWGN standard deviation on the observation (≈12.75/255)
  noise_level_model: noise_level_img
  blur_mode: "Gaussian" # "Gaussian" or "motion"
  kernel_size: 61
  kernel_std: 3.0

  # -----------------------------------------------------------------------------
  # PnP+DRUNet hyper‑parameters (map directly to cfg.extra in MethodConfig)
  # -----------------------------------------------------------------------------

  # Choose which prior to use in PnP. Set to "gaussian" to use the
  # GaussianDenoiser baseline, or "drunet" to use the DRUNet prior below.
  denoiser: drunet

  # DPIR paper uses 200 iterations for quality restoration; 50 is too few for
  # the logspace annealing (rho 0.07 → 39) to complete and deliver a sharp result.
  num_iters: 200
  step_size: 1.0
  data_weight: 1.0

  # Terminal sigma for the logspace schedule: logspace(49/255, denoiser_sigma, num_iters).
  # 2/255 ≈ 0.008 is the DPIR default: final rho ≈ (0.05/0.008)² ≈ 39 so the
  # data step (Wiener deconvolution) dominates and the output is sharp.
  denoiser_sigma: 0.008

  # Fallback Gaussian denoiser parameters (used if denoiser: gaussian)
  gaussian_kernel_size: 5
  gaussian_sigma: 1.0

  # ---------------------------------------------------------------------------
  # DRUNet weights
  # ---------------------------------------------------------------------------
  # Pretrained DRUNet models are provided by the official DPIR repo:
  #   https://github.com/cszn/DPIR
  # A commonly used color model is available via:
  #   https://github.com/cszn/DPIR/releases/download/v1.0/drunet_color.pth
  #
  # 1) Download that file and place it under `model_zoo/` in this project.
  # Leave empty to load from Hugging Face (perckle/DPIR) by default.
  # Set to a local path (e.g. model_zoo/drunet_color.safetensors) to override.
  drunet_weights_path: ""

  # ---------------------------------------------------------------------------
  # Output and metrics
  # ---------------------------------------------------------------------------
  calc_LPIPS: true
  save_L: true
  save_E: true
  clamp: true
  output_root: "outputs"

pnp_gaussian:
  # Base configuration for PnP+DRUNet experiments.
  # This file mirrors the structure of the other task configs (deblur/sisr)
  # but adds a section for PnP-specific hyper‑parameters and DRUNet weights.

  # -----------------------------------------------------------------------------
  # Core experiment settings (used to build MethodConfig)
  # -----------------------------------------------------------------------------

  # Task can be "sr", "deblur", or "inpaint". For the current project we
  # primarily use this as a deblurring baseline; adjust as needed.
  task: deblur

  # Name of the method in plots / registries
  name: pnp_gaussian

  # For PnP we do not use the diffusion model; this field is still required by
  # MethodConfig and is used only as a label.
  generate_mode: pnp_gaussian

  # Global scalar hyper‑parameters forwarded to MethodConfig
  lambda_: 1.0
  zeta: 0.0

  # Scale factor (sf=1 for deblurring, sf=4 for SR, etc.)
  sf: 1

  # -----------------------------------------------------------------------------
  # Degradation model (kept consistent with DiffPIR deblur config)
  # -----------------------------------------------------------------------------

  noise_level_img: 0.05 # AWGN standard deviation on the observation (≈12.75/255)
  noise_level_model: noise_level_img
  blur_mode: "Gaussian" # "Gaussian" or "motion"
  kernel_size: 61
  kernel_std: 3.0

  # -----------------------------------------------------------------------------
  # PnP+DRUNet hyper‑parameters (map directly to cfg.extra in MethodConfig)
  # -----------------------------------------------------------------------------

  # Choose which prior to use in PnP. Set to "gaussian" to use the
  # GaussianDenoiser baseline, or "drunet" to use the DRUNet prior below.
  denoiser: gaussian

  # Gaussian is a weak baseline; more iterations help the data step accumulate
  # corrections, but it will remain softer than DRUNet.
  num_iters: 100
  step_size: 1.0
  data_weight: 1.0

  # rho schedule: logspace(49/255, denoiser_sigma, num_iters).
  # Use noise_level_img as terminal sigma so rho_final = 1 (balanced).
  # Gaussian can't recover HF anyway; too large rho just creates ringing.
  denoiser_sigma: 0.05

  # Gaussian kernel: reduce sigma from 1.0 → 0.5 so each prior step blurs less,
  # leaving more room for the data step to reconstruct sharp edges.
  gaussian_kernel_size: 5
  gaussian_sigma: 0.5

  # ---------------------------------------------------------------------------
  # Output and metrics
  # ---------------------------------------------------------------------------
  calc_LPIPS: true
  save_L: true
  save_E: true
  clamp: true
  output_root: "outputs"
