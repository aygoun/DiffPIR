diffpir:
  task: deblur
  seed: 42

  noise_level_img: 0.05
  noise_level_model: noise_level_img
  model_name: diffusion_ffhq_10m
  testset_name: demo_test
  num_train_timesteps: 1000
  iter_num: 100
  iter_num_U: 1
  batch_size: 16

  save_L: true
  save_E: true

  lambda_: 2
  zeta: 0.25
  sub_1_analytic: true
  log_process: false
  ddim_sample: false
  model_output_type: pred_xstart
  generate_mode: DiffPIR
  skip_type: quad
  eta: 0
  guidance_scale: 1.0 # effective guidance scale
  n_channels: 3
  cwd: ""

  calc_LPIPS: true
  beta_start: 0.0001
  beta_end: 0.02

  noise_init_img: max
  skip_noise_model_t: false

  # deblur
  sf: 1
  use_DIY_kernel: true
  blur_mode: "Gaussian" # Gaussian; motion
  kernel_size: 61


